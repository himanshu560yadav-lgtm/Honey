name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create local.properties with API key
      run: |
        echo "sdk.dir=/usr/lib/android-sdk" > local.properties
        echo "GEMINI_API_KEYS=AIzaSyC5QPrF5df-r1rWoFX7ar8qFw0P9W9zUrs" >> local.properties
        echo "GCLOUD_PROXY_URL=" >> local.properties
        echo "GCLOUD_PROXY_URL_KEY=" >> local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Honey-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk